<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-labelledby="title desc">
  <title id="title">minha prótese</title>
  <desc id="desc">Logotipo minha prótese — marca de e-commerce de componentes para prótese e órtese.</desc>

  <!-- Mark: articulação estilizada (joelho/cotovelo). Dois traços rígidos unidos por um eixo circular (a articulação), com um arco indicando movimento. -->
  <g id="mark" transform="translate(0,8)">
    <!-- arco de movimento -->
    <path d="M14 84 A 50 50 0 0 1 96 30" fill="none" stroke="#14B4B4" stroke-width="6" stroke-linecap="round"/>
    <!-- segmento superior (membro residual) -->
    <line x1="58" y1="22" x2="92" y2="60" stroke="#1F262B" stroke-width="10" stroke-linecap="round"/>
    <!-- segmento inferior (prótese) -->
    <line x1="92" y1="60" x2="76" y2="100" stroke="#1F262B" stroke-width="10" stroke-linecap="round"/>
    <!-- pivô / articulação -->
    <circle cx="92" cy="60" r="9" fill="#FAF6F0" stroke="#14B4B4" stroke-width="4"/>
    <!-- ponto interno de pivô -->
    <circle cx="92" cy="60" r="2.5" fill="#F09020"/>
  </g>

  <!-- Wordmark: "minha · prótese" -->
  <g id="wordmark" transform="translate(130,72)" font-family="Lexend, 'Helvetica Neue', Arial, sans-serif" font-weight="600">
    <text x="0" y="0" font-size="44" letter-spacing="-1.2" fill="#1F262B">minha</text>
    <!-- ponto laranja entre palavras -->
    <circle cx="148" cy="-12" r="4.5" fill="#F09020"/>
    <text x="164" y="0" font-size="44" letter-spacing="-1.2" fill="#1F262B">prótese</text>
  </g>
</svg>
