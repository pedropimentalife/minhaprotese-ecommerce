<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">Tecnologia e cuidado para cada passo</title>
  <desc id="d">Ilustração da marca minhaprotese.com.br: símbolo de movimento em azul-marinho e laranja sobre fundo gradiente azul.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E5BB8"/>
      <stop offset="60%" stop-color="#15428A"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.30" r="0.55">
      <stop offset="0%" stop-color="#FFC66D" stop-opacity="0.34"/>
      <stop offset="55%" stop-color="#F28C28" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orangeSweep" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#F28C28"/>
      <stop offset="100%" stop-color="#FFC66D"/>
    </linearGradient>
  </defs>

  <!-- Fundo gradiente -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- Curvas decorativas de "movimento" -->
  <g opacity="0.10" stroke="#FFFFFF" stroke-width="2" fill="none">
    <path d="M -50 480 Q 200 380, 400 440 T 850 380"/>
    <path d="M -50 510 Q 220 420, 420 470 T 850 420"/>
    <path d="M -50 540 Q 240 460, 440 500 T 850 460"/>
  </g>

  <!-- Pontos de luz / passos -->
  <g fill="#FFC66D" opacity="0.5">
    <circle cx="120" cy="180" r="3"/>
    <circle cx="180" cy="140" r="2"/>
    <circle cx="240" cy="200" r="2.5"/>
    <circle cx="640" cy="120" r="3"/>
    <circle cx="700" cy="80" r="2"/>
    <circle cx="60" cy="240" r="2"/>
  </g>

  <!-- Símbolo central da marca (escalado e suavizado) -->
  <g transform="translate(180 90) scale(2.6)">
    <!-- pontos da cabeça / pé -->
    <circle cx="84" cy="28" r="20" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="91" cy="185" r="17" fill="#FFFFFF" opacity="0.95"/>
    <!-- corpo navy escuro reforçando o impulso -->
    <path d="M10 112 C54 58, 100 78, 160 66 C132 104, 85 92, 38 130 Z" fill="#FFFFFF" opacity="0.92"/>
    <!-- impulso laranja vibrante -->
    <path d="M22 190 C68 112, 118 90, 145 112 C112 134, 91 170, 42 215 Z" fill="url(#orangeSweep)"/>
  </g>

  <!-- Tag inferior discreta -->
  <text x="60" y="555" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="13" letter-spacing="4" fill="#FFFFFF" opacity="0.55">MOBILIDADE · AUTONOMIA · POSSIBILIDADES</text>
</svg>
